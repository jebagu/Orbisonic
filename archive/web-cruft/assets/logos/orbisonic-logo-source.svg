<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Surround Sound Logo Option 6 vector</title>
  <desc id="desc">A flat two-color vector version of the six-point surround sound logo.</desc>
