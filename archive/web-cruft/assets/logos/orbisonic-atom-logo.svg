<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Sonic Sphere flat logo</title>
  <desc id="desc">A two-color flat vector recreation of the original low-resolution Sonic Sphere mark.</desc>
  <rect width="256" height="256" fill="#2a2e38" />

  <defs>
    <path
      id="corner-piece"
      d="M31 31
         C31 28.5 33 27 36 27
         H75
         C80 27 81.5 30.5 76.5 33
         C57.5 38.5 40.5 55.5 34 76.5
         C32.5 81.5 29 80 29 75
         V36
         C29 33 30 31.5 31 31Z"
    />

    <path
      id="atom-ring"
      fill-rule="evenodd"
      d="M190 128
         C190 146.2 162.2 161 128 161
         C93.8 161 66 146.2 66 128
         C66 109.8 93.8 95 128 95
         C162.2 95 190 109.8 190 128Z
         M181.5 128
         C181.5 138.5 157.5 147 128 147
         C98.5 147 74.5 138.5 74.5 128
         C74.5 117.5 98.5 109 128 109
         C157.5 109 181.5 117.5 181.5 128Z"
    />
  </defs>

  <g fill="#2ecc8a">
    <use href="#corner-piece" />
    <use href="#corner-piece" transform="rotate(90 128 128)" />
    <use href="#corner-piece" transform="rotate(180 128 128)" />
    <use href="#corner-piece" transform="rotate(270 128 128)" />

    <use href="#atom-ring" transform="rotate(45 128 128)" />
    <use href="#atom-ring" transform="rotate(-45 128 128)" />
  </g>
</svg>
